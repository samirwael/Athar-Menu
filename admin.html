<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATHAR — Admin Login</title>
  <script>
    (function() {
      const PASS = "athar@2026#";
      const SESSION_KEY = "athar_admin_auth";
      if (sessionStorage.getItem(SESSION_KEY) !== "1") {
        document.addEventListener("DOMContentLoaded", function() {
          document.title = "ATHAR — Admin Login";
          // Build lock screen
          const lock = document.createElement("div");
          lock.id = "lockScreen";
          lock.style.cssText = "position:fixed;inset:0;background:#2e1a0e;z-index:99999;display:flex;align-items:center;justify-content:center;font-family:'Lato',sans-serif;";
          lock.innerHTML = `
            <div style="background:#f5f0e8;border-radius:20px;padding:40px 36px;width:100%;max-width:360px;box-shadow:0 30px 80px rgba(0,0,0,0.5);text-align:center;">
              <div style="width:48px;height:48px;border-radius:50%;background:#2e1a0e;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b8924a" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </div>
              <p style="font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.35em;color:#b8924a;text-transform:uppercase;margin-bottom:4px;">Athar</p>
              <h2 style="font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:0.06em;color:#2e1a0e;margin-bottom:24px;">Admin Access</h2>
              <input id="lockInput" type="password" placeholder="Enter password…"
                style="width:100%;padding:12px 16px;border:1.5px solid rgba(184,146,74,0.3);border-radius:10px;background:#ede5d5;font-family:'Lato',sans-serif;font-size:0.9rem;color:#3a2810;outline:none;margin-bottom:10px;box-sizing:border-box;transition:border-color 0.2s;"
                onkeydown="if(event.key==='Enter')window._checkPass()">
              <div id="lockError" style="color:#c06060;font-size:0.72rem;min-height:18px;margin-bottom:10px;"></div>
              <button onclick="window._checkPass()"
                style="width:100%;padding:13px;background:#b8924a;border:none;border-radius:10px;font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.2em;color:#fff;cursor:pointer;transition:background 0.2s;">
                ENTER
              </button>
            </div>`;
          document.body.appendChild(lock);
          // Hide the real page content
          document.body.style.overflow = "hidden";
          document.querySelectorAll("body > *:not(#lockScreen)").forEach(el => el.style.visibility = "hidden");
          setTimeout(() => document.getElementById("lockInput").focus(), 100);

          window._checkPass = function() {
            const input = document.getElementById("lockInput");
            const err   = document.getElementById("lockError");
            if (input.value === PASS) {
              sessionStorage.setItem(SESSION_KEY, "1");
              document.title = "ATHAR — Menu Manager";
              lock.style.transition = "opacity 0.4s";
              lock.style.opacity = "0";
              document.querySelectorAll("body > *:not(#lockScreen)").forEach(el => el.style.visibility = "");
              document.body.style.overflow = "";
              setTimeout(() => lock.remove(), 400);
            } else {
              err.textContent = "Incorrect password. Try again.";
              input.value = "";
              input.style.borderColor = "#c06060";
              setTimeout(() => { err.textContent = ""; input.style.borderColor = "rgba(184,146,74,0.3)"; }, 2500);
              input.focus();
            }
          };
        });
      }
    })();
  </script>
  <title>ATHAR — Menu Image Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cream: #f5f0e8;
      --beige: #ede5d5;
      --sand: #d9c9b0;
      --gold: #b8924a;
      --dark-gold: #8a6a2e;
      --brown: #5c3d1e;
      --dark-brown: #2e1a0e;
      --text: #3a2810;
      --muted: #7a6040;
      --white: #fdfaf5;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--dark-brown);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(184, 146, 74, 0.25);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px rgba(184, 146, 74, 0.6);
    }

    .header-title {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      color: var(--sand);
      text-transform: uppercase;
    }

    .header-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.82rem;
      color: rgba(217, 201, 176, 0.5);
      margin-left: 4px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* Live badge */
    .live-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: #6dbf6d;
      border: 1px solid rgba(109, 191, 109, 0.35);
      background: rgba(109, 191, 109, 0.08);
      padding: 8px 16px;
      border-radius: 50px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #6dbf6d;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(109, 191, 109, 0.5);
      }

      50% {
        opacity: 0.7;
        box-shadow: 0 0 0 5px rgba(109, 191, 109, 0);
      }
    }

    .btn-view-site {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      padding: 10px 20px;
      border: 1px solid rgba(184, 146, 74, 0.35);
      background: rgba(184, 146, 74, 0.1);
      color: var(--sand);
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
    }

    .btn-view-site:hover {
      background: rgba(184, 146, 74, 0.2);
      color: var(--gold);
    }

    .btn-reset {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      padding: 10px 20px;
      border: 1px solid rgba(217, 201, 176, 0.2);
      background: transparent;
      color: rgba(217, 201, 176, 0.55);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-reset:hover {
      border-color: rgba(217, 201, 176, 0.5);
      color: var(--sand);
    }

    /* ── TOOLBAR ── */
    .toolbar {
      padding: 20px 40px;
      background: var(--beige);
      border-bottom: 1px solid rgba(184, 146, 74, 0.15);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 340px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid rgba(184, 146, 74, 0.3);
      border-radius: 10px;
      background: var(--white);
      font-family: 'Lato', sans-serif;
      font-size: 0.8rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    #searchInput:focus {
      border-color: var(--gold);
    }

    #searchInput::placeholder {
      color: var(--muted);
    }

    .cat-filter {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .cat-chip {
      font-family: 'Lato', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      padding: 7px 16px;
      border: 1px solid var(--sand);
      border-radius: 50px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .cat-chip:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .cat-chip.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--white);
    }

    .count-badge {
      margin-left: auto;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.88rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── STATUS BAR ── */
    #statusBar {
      padding: 10px 40px;
      background: rgba(184, 146, 74, 0.08);
      border-bottom: 1px solid rgba(184, 146, 74, 0.12);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      display: none;
    }

    #statusBar.show {
      display: block;
    }

    #statusBar.success {
      background: rgba(100, 160, 100, 0.1);
      color: #4a7a40;
    }

    #statusBar.error {
      background: rgba(180, 80, 80, 0.1);
      color: #8a4040;
    }

    /* ── GRID ── */
    .grid-wrap {
      padding: 28px 40px 60px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .grid-section-title {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 18px 0 10px;
      border-bottom: 1px solid rgba(184, 146, 74, 0.15);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .grid-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(184, 146, 74, 0.15);
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 8px;
    }

    /* ── CARD ── */
    .item-card {
      background: var(--white);
      border: 1px solid rgba(184, 146, 74, 0.12);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      animation: cardIn 0.35s ease both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 32px rgba(92, 61, 30, 0.13);
      border-color: rgba(184, 146, 74, 0.35);
    }

    .item-card.has-custom {
      border-color: rgba(100, 160, 80, 0.4);
    }

    .item-card.has-custom::after {
      content: '✓';
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      background: rgba(80, 140, 60, 0.85);
      color: #fff;
      border-radius: 50%;
      font-size: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 4/3;
      position: relative;
      overflow: hidden;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .item-card:hover .card-thumb img {
      transform: scale(1.05);
    }

    .card-thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(46, 26, 14, 0.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .item-card:hover .card-overlay {
      opacity: 1;
    }

    .overlay-icon {
      width: 36px;
      height: 36px;
      border: 1.5px solid rgba(217, 201, 176, 0.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--sand);
    }

    .overlay-label {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: rgba(217, 201, 176, 0.8);
    }

    .card-body {
      padding: 13px 15px 15px;
    }

    .card-cat {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: var(--dark-brown);
      margin-bottom: 5px;
      line-height: 1.35;
    }

    .card-img-url {
      font-size: 0.6rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: monospace;
    }

    /* ── MODAL ── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(46, 26, 14, 0.72);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .modal-bg.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--white);
      border-radius: 20px;
      width: 100%;
      max-width: 520px;
      overflow: hidden;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.3s ease;
      box-shadow: 0 30px 80px rgba(46, 26, 14, 0.4);
    }

    .modal-bg.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-preview {
      width: 100%;
      aspect-ratio: 16/9;
      position: relative;
      overflow: hidden;
      background: var(--dark-brown);
    }

    .modal-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal-preview-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(217, 201, 176, 0.3);
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
    }

    .modal-body {
      padding: 24px 28px 28px;
    }

    .modal-eyebrow {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .modal-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      color: var(--dark-brown);
      margin-bottom: 18px;
    }

    .modal-tabs {
      display: flex;
      gap: 0;
      border: 1px solid rgba(184, 146, 74, 0.25);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .modal-tab {
      flex: 1;
      padding: 9px;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-tab.active {
      background: var(--gold);
      color: var(--white);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .upload-zone {
      border: 1.5px dashed rgba(184, 146, 74, 0.4);
      border-radius: 12px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      background: rgba(184, 146, 74, 0.03);
      position: relative;
    }

    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--gold);
      background: rgba(184, 146, 74, 0.07);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(184, 146, 74, 0.35);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      color: var(--gold);
    }

    .upload-zone p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .upload-zone span {
      font-size: 0.65rem;
      color: var(--sand);
    }

    .url-input-wrap {
      position: relative;
    }

    .url-input-wrap input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid rgba(184, 146, 74, 0.3);
      border-radius: 10px;
      background: var(--beige);
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input-wrap input:focus {
      border-color: var(--gold);
    }

    .url-input-wrap input::placeholder {
      color: var(--sand);
      font-family: 'Lato', sans-serif;
    }

    .url-preview-note {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 8px;
      font-style: italic;
    }

    .filename-wrap {
      margin-top: 14px;
    }

    .filename-label {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    .filename-wrap input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(184, 146, 74, 0.3);
      border-radius: 10px;
      background: var(--beige);
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .filename-wrap input:focus {
      border-color: var(--gold);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .btn-apply {
      flex: 1;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      padding: 12px;
      border: 1px solid var(--gold);
      background: var(--gold);
      color: var(--white);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-apply:hover {
      background: var(--dark-gold);
      border-color: var(--dark-gold);
    }

    .btn-apply:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-clear {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      padding: 12px 18px;
      border: 1px solid rgba(184, 146, 74, 0.25);
      background: transparent;
      color: var(--muted);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-clear:hover {
      border-color: #c06060;
      color: #c06060;
    }

    .btn-cancel {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      padding: 12px 16px;
      border: 1px solid rgba(184, 146, 74, 0.2);
      background: transparent;
      color: var(--muted);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-cancel:hover {
      border-color: var(--sand);
      color: var(--text);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      header {
        padding: 14px 20px;
        flex-wrap: wrap;
        gap: 10px;
      }

      .toolbar {
        padding: 14px 20px;
      }

      .grid-wrap {
        padding: 16px 20px 40px;
      }

      .menu-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 10px;
      }

      .cat-filter {
        display: none;
      }

      .count-badge {
        display: none;
      }
    }

    /* ── MODAL CLOSE BTN ── */
    .modal-close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(20,10,3,0.55);
      color: rgba(217,201,176,0.8);
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
      z-index: 10;
    }

    // ─── FIREBASE REALTIME DATABASE SETUP ───
    const FB_BASE = "https://athar-menu-default-rtdb.firebaseio.com/menu";

    async function fbGet(path) {
      const res = await fetch(`${FB_BASE}/${path}.json`);
      const data = await res.json();
      return data || {};
    }
    async function fbSet(path, value) {
      await fetch(`${FB_BASE}/${path}.json`, {
        method: "PUT",
        body: JSON.stringify(value),
        headers: { "Content-Type": "application/json" }
      });
    }
    async function fbPatch(path, updates) {
      await fetch(`${FB_BASE}/${path}.json`, {
        method: "PATCH",
        body: JSON.stringify(updates),
        headers: { "Content-Type": "application/json" }
      });
    }
    async function fbDelete(path) {
      await fetch(`${FB_BASE}/${path}.json`, { method: "DELETE" });
    }
    async function fbGetAll(node) {
      const data = await fbGet(node);
      if (!data || typeof data !== "object") return {};
      return data;
    }

    // Safe key: Firebase doesn't allow . $ # [ ] / in keys
    function fbKey(str) {
      return str.replace(/[.$#[\]/]/g, "_");
    }

    // Shorthands matching old call sites
    const dbSet    = (k, v) => fbPatch("image_overrides", { [fbKey(k)]: v });
    const dbDelete = (k)    => fbDelete("image_overrides/" + fbKey(k));
    const dbGetAll = ()     => fbGetAll("image_overrides");
    const dbClear  = ()     => fbSet("image_overrides", null);

    const storeSet    = (store, k, v) => fbPatch(store, { [fbKey(k)]: v });
    const storeDelete = (store, k)    => fbDelete(store + "/" + fbKey(k));
    const storeGetAll = (store)       => fbGetAll(store);
    const storeClear  = (store)       => fbSet(store, null);

    // No-op — Firebase is the source of truth, index page reads directly
    function notifyIndexPage() {}

    // ─── STATE ───
    const catColors = {
      "Hot Drinks": { bg: "#4a2810", accent: "#c9a97a" },
      "Iced Coffee": { bg: "#1a3040", accent: "#7ab8d4" },
      "Coffee Blended": { bg: "#3a2010", accent: "#c4a060" },
      "Non-Coffee Blended": { bg: "#1a2818", accent: "#8ac48a" },
      "Milkshakes": { bg: "#3a1030", accent: "#d490b0" },
      "Fresh Juice": { bg: "#2a3010", accent: "#b0c860" },
      "Refreshers": { bg: "#102830", accent: "#60c0c0" },
      "Matcha": { bg: "#142814", accent: "#70b870" },
      "Tea": { bg: "#301818", accent: "#c48050" },
      "Breakfast": { bg: "#3a2808", accent: "#e8b860" },
      "Desserts": { bg: "#2a1018", accent: "#c06880" },
      "Extras": { bg: "#282010", accent: "#b8924a" },
    };

    let overrides = {};        // image overrides  { key: imgSrc }
    let detailOverrides = {};  // detail overrides { key: {name,desc,price,cat} }
    let addedItems = {};       // added items      { key: {cat,name,desc,price,img} }
    let deletedKeys = {};      // deleted item keys { key: true }
    let customCategories = {}; // admin-added categories { name: true }
    let activeFilter = "All";
    let activeItem = null;
    let pendingDataUrl = null;
    let activeTab = "details";
    let modalMode = "edit";    // "edit" | "add"
    let addingToCat = null;

    const BASE_CATEGORIES = Object.keys(catColors);

    function getAllCategories() {
      return ["All", ...BASE_CATEGORIES, ...Object.keys(customCategories).filter(c => !BASE_CATEGORIES.includes(c))];
    }

    // ─── INIT ───
    async function _initBase() {
      overrides = await dbGetAll();
      buildCatFilter();
      renderGrid();
    }

    function buildCatFilter() {
      const wrap = document.getElementById("catFilter");
      wrap.innerHTML = getAllCategories().map(c =>
        `<button class="cat-chip ${c === activeFilter ? "active" : ""}" onclick="setFilter('${c.replace(/'/g,"\\'")}')">${c}</button>`
      ).join("");
    }

    function setFilter(cat) {
      activeFilter = cat;
      document.querySelectorAll(".cat-chip").forEach(b => b.classList.toggle("active", b.textContent === cat));
      renderGrid();
    }

    // ─── RENDER GRID ───
    function renderGrid() {
      const wrap = document.getElementById("gridWrap");
      const q = document.getElementById("searchInput").value.trim().toLowerCase();

      // Merge added items into menuData view (not in base menuData)
      const allItems = [
        ...menuData.filter(i => !deletedKeys[fbKey(itemKey(i))]),
        ...Object.values(addedItems)
      ];

      let items = activeFilter === "All" ? allItems : allItems.filter(i => i.cat === activeFilter);
      if (q) items = items.filter(i => `${i.name} ${i.cat} ${i.desc}`.toLowerCase().includes(q));

      document.getElementById("countBadge").textContent = `${items.length} item${items.length !== 1 ? "s" : ""}`;

      // Group by category — preserve category order
      const catOrder = getAllCategories().filter(c => c !== "All");
      const grouped = {};
      items.forEach(item => {
        if (!grouped[item.cat]) grouped[item.cat] = [];
        grouped[item.cat].push(item);
      });

      // Also include empty categories (for add-only sections)
      if (activeFilter !== "All") {
        if (!grouped[activeFilter]) grouped[activeFilter] = [];
      }

      const sortedCats = Object.keys(grouped).sort((a, b) => {
        const ai = catOrder.indexOf(a), bi = catOrder.indexOf(b);
        return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
      });

      if (!sortedCats.length) {
        wrap.innerHTML = '<div class="menu-grid"><div class="empty-state">No items found.</div></div>';
        return;
      }

      wrap.innerHTML = sortedCats.map(cat => {
        const catItems = grouped[cat] || [];
        return `
          <div class="grid-section-title">${cat} <span style="color:var(--sand);font-size:0.6rem;">${catItems.length}</span></div>
          <div class="menu-grid">
            ${catItems.map(item => renderCard(item)).join("")}
            <button class="add-item-btn" onclick="openAddModal('${cat.replace(/'/g,"\\'")}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add Item
            </button>
          </div>`;
      }).join("");
    }

    function itemKey(item) {
      return item.cat + "::" + item.name;
    }

    function renderCard(item) {
      const key        = fbKey(itemKey(item));
      const isAdded    = !!addedItems[key];
      const customImg  = overrides[key];
      const customDet  = detailOverrides[key];
      const imgSrc     = customImg || item.img;
      const hasCustom  = !!customImg;
      const hasDet     = !!customDet;
      const col        = catColors[item.cat] || { bg: "#2e1a0e", accent: "#b8924a" };
      const displayName  = (customDet && customDet.name)  || item.name;
      const displayPrice = (customDet && customDet.price) || item.price;
      const shortUrl   = imgSrc && imgSrc.startsWith("data:") ? "📎 Local file" : (imgSrc || "").replace("https://images.unsplash.com/", "unsplash/").replace(/\?.*/, "");

      // Escape for inline onclick attrs
      const eCat  = item.cat.replace(/'/g, "\\'");
      const eName = item.name.replace(/'/g, "\\'");

      return `
    <div class="item-card ${hasCustom ? "has-custom" : ""} ${hasDet ? "has-details-change" : ""} ${isAdded ? "is-added" : ""}"
         onclick="openModal('${eCat}', '${eName}')">
      <div class="card-thumb" style="background:linear-gradient(145deg,${col.bg}ee,${col.bg}99);">
        <img src="${imgSrc}" alt="${displayName}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="card-thumb-placeholder" style="display:none;">
          <svg width="32" viewBox="0 0 40 56" fill="${col.accent}" opacity="0.5"><path d="M20 2 C13 11 7 18 7 28 C7 40 13 50 20 54 C27 50 33 40 33 28 C33 18 27 11 20 2Z"/></svg>
        </div>
        <div class="card-overlay">
          <div class="overlay-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </div>
          <span class="overlay-label">Edit Item</span>
        </div>
        <!-- Delete button -->
        <button class="card-delete-btn" onclick="event.stopPropagation(); deleteItem('${eCat}', '${eName}')" title="Delete item">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
      <div class="card-body">
        <div class="card-cat">${item.cat}</div>
        <div class="card-name" style="${hasDet && customDet.name ? 'color:var(--gold)' : ''}">${displayName}</div>
        <div class="card-img-url" style="display:flex;justify-content:space-between;align-items:center;gap:4px;">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${shortUrl}</span>
          <span style="font-family:'Cormorant Garamond',serif;font-size:0.78rem;color:var(--gold);font-style:italic;flex-shrink:0;">${displayPrice}</span>
        </div>
      </div>
    </div>`;
    }

    // ─── REBUILD CATEGORY SELECT ───
    function rebuildCatSelect(selectedCat) {
      const sel = document.getElementById("editCat");
      const cats = getAllCategories().filter(c => c !== "All");
      sel.innerHTML = cats.map(c => `<option value="${c}" ${c === selectedCat ? "selected" : ""}>${c}</option>`).join("");
    }

    // ─── MODAL — EDIT MODE ───
    function openModal(cat, name) {
      // Check both base menuData and addedItems
      const allItems = [...menuData, ...Object.values(addedItems)];
      activeItem = allItems.find(i => i.cat === cat && i.name === name);
      if (!activeItem) return;
      modalMode = "edit";

      const key       = itemKey(activeItem);
      const customImg = overrides[key];
      const customDet = detailOverrides[key] || {};
      const imgSrc    = customImg || activeItem.img;

      updateModalPreview(imgSrc);
      document.getElementById("modalCat").textContent = activeItem.cat;

      // Mode badge
      const badge = document.getElementById("modalModeBadge");
      badge.textContent = "✎ Edit Item";
      badge.className   = "modal-mode-badge mode-edit";

      // Details tab
      rebuildCatSelect(customDet.cat ?? activeItem.cat);
      document.getElementById("editName").value  = customDet.name  ?? activeItem.name;
      document.getElementById("editDesc").value  = customDet.desc  ?? activeItem.desc;
      document.getElementById("editPrice").value = customDet.price ?? activeItem.price;

      // Buttons
      document.getElementById("btnSaveDetails").textContent  = "Save Details";
      document.getElementById("btnResetDetails").style.display = "";

      // Image tabs
      document.getElementById("fileInput").value = "";
      document.getElementById("urlInput").value  = imgSrc && !imgSrc.startsWith("data:") ? imgSrc : "";
      pendingDataUrl = null;

      switchTab("details");
      document.getElementById("modalBg").classList.add("open");
      document.body.style.overflow = "hidden";
    }

    // ─── MODAL — ADD MODE ───
    function openAddModal(cat) {
      modalMode    = "add";
      addingToCat  = cat;
      activeItem   = null;

      updateModalPreview("");
      document.getElementById("modalCat").textContent = cat;

      const badge = document.getElementById("modalModeBadge");
      badge.textContent = "+ New Item";
      badge.className   = "modal-mode-badge mode-add";

      // Clear details fields
      rebuildCatSelect(cat);
      document.getElementById("editName").value  = "";
      document.getElementById("editDesc").value  = "";
      document.getElementById("editPrice").value = "";

      // Buttons
      document.getElementById("btnSaveDetails").textContent  = "Add Item";
      document.getElementById("btnResetDetails").style.display = "none";

      // Image tabs
      document.getElementById("fileInput").value = "";
      document.getElementById("urlInput").value  = "";
      pendingDataUrl = null;

      switchTab("details");
      document.getElementById("modalBg").classList.add("open");
      document.body.style.overflow = "hidden";
    }

    // ─── DELETE ITEM ───
    async function deleteItem(cat, name) {
      const allItems = [...menuData, ...Object.values(addedItems)];
      const item = allItems.find(i => i.cat === cat && i.name === name);
      if (!item) return;

      const displayName = item.name;
      if (!confirm(`Delete "${displayName}" from the menu? This cannot be undone.`)) return;

      const key    = fbKey(itemKey(item));
      const isNew  = !!addedItems[key];

      if (isNew) {
        // It's an admin-added item — just remove from addedItems store
        await storeDelete("added_items", key);
        delete addedItems[key];
        // Also clean up any overrides for it
        await storeDelete("image_overrides", key);
        await storeDelete("item_overrides", key);
        delete overrides[key];
        delete detailOverrides[key];
      } else {
        // It's a base item — mark as deleted
        await storeSet("deleted_items", key, true);
        deletedKeys[key] = true;
        // Also clean up any overrides
        await storeDelete("image_overrides", key);
        await storeDelete("item_overrides", key);
        delete overrides[key];
        delete detailOverrides[key];
      }

      notifyIndexPage();
      renderGrid();
      showStatus(`"${displayName}" removed from the menu.`, "success");
    }

    function closeModal() {
      document.getElementById("modalBg").classList.remove("open");
      document.body.style.overflow = "";
      activeItem = null;
      pendingDataUrl = null;
    }

    function handleModalBgClick(e) {
      if (e.target === document.getElementById("modalBg")) closeModal();
    }

    function updateModalPreview(src) {
      const img = document.getElementById("modalPreviewImg");
      const ph  = document.getElementById("modalPreviewPlaceholder");
      if (src) { img.src = src; img.style.display = "block"; ph.style.display = "none"; }
      else     { img.style.display = "none"; ph.style.display = "flex"; }
    }

    function switchTab(tab) {
      activeTab = tab;
      const tabOrder = ["details", "upload", "url"];
      document.querySelectorAll(".modal-tab").forEach((b, i) => b.classList.toggle("active", tabOrder[i] === tab));
      tabOrder.forEach(t => {
        const el = document.getElementById("tab-" + t);
        if (el) el.classList.toggle("active", t === tab);
      });
    }

    // ─── APPLY DETAILS ───
    async function applyDetails() {
      const name  = document.getElementById("editName").value.trim();
      const desc  = document.getElementById("editDesc").value.trim();
      const price = document.getElementById("editPrice").value.trim();
      const cat   = document.getElementById("editCat").value;

      if (!name)  { showStatus("Name cannot be empty.", "error"); return; }
      if (!price) { showStatus("Price cannot be empty.", "error"); return; }

      // ── ADD MODE ──
      if (modalMode === "add") {
        const newItem = { cat, name, desc, price, img: pendingDataUrl || document.getElementById("urlInput").value.trim() || "" };
        const key = fbKey(cat + "::" + name);
        // Prevent duplicate keys
        if (addedItems[key] || menuData.some(i => fbKey(itemKey(i)) === key)) {
          showStatus(`An item named "${name}" already exists in ${cat}.`, "error"); return;
        }
        try {
          await storeSet("added_items", key, newItem);
          if (newItem.img) await storeSet("image_overrides", key, newItem.img);
          addedItems[key] = newItem;
          notifyIndexPage();
          closeModal();
          renderGrid();
          showStatus(`✓ "${name}" added to ${cat} — live on the main page now.`, "success");
        } catch (e) {
          showStatus("Could not save new item.", "error");
        }
        return;
      }

      // ── EDIT MODE ──
      if (!activeItem) return;
      const key = fbKey(itemKey(activeItem));
      const details = { name, desc, price, cat };
      try {
        await storeSet("item_overrides", key, details);
        detailOverrides[key] = details;
        // Also update the live menuData so the grid reflects changes immediately
        const idx = menuData.findIndex(i => i.cat === activeItem.cat && i.name === activeItem.name);
        if (idx !== -1) {
          menuData[idx] = { ...menuData[idx], name, desc, price, cat };
        }
        // If it's an added item, update addedItems too
        if (addedItems[key]) {
          addedItems[key] = { ...addedItems[key], ...details };
          await storeSet("added_items", key, addedItems[key]);
        }
        notifyIndexPage();
        closeModal();
        renderGrid();
        showStatus(`✓ "${name}" updated — live on the main page now.`, "success");
      } catch (e) {
        showStatus("Could not save changes.", "error");
      }
    }

    async function clearDetails() {
      if (!activeItem) return;
      const key = fbKey(itemKey(activeItem));
      await storeDelete("item_overrides", key);
      delete detailOverrides[key];
      // restore original from source data
      const original = menuData.find(i => fbKey(itemKey(i)) === key);
      if (original) {
        document.getElementById("editName").value  = activeItem.name;
        document.getElementById("editDesc").value  = activeItem.desc;
        document.getElementById("editPrice").value = activeItem.price;
        document.getElementById("editCat").value   = activeItem.cat;
      }
      notifyIndexPage();
      closeModal();
      renderGrid();
      showStatus("Details reset to default.", "");
    }

    // ─── FILE UPLOAD ───
    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        pendingDataUrl = ev.target.result;
        updateModalPreview(pendingDataUrl);
      };
      reader.readAsDataURL(file);
      const ext = file.name.split(".").pop();
      const fi = document.getElementById("filenameInput");
      if (fi && !fi.value) fi.value = suggestFilename(activeItem ? activeItem.name : "image", ext);
    }

    function suggestFilename(name, ext = "jpg") {
      return name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") + "." + ext;
    }

    // ─── URL PREVIEW ───
    function previewUrl() {
      const url = document.getElementById("urlInput").value.trim();
      if (url) updateModalPreview(url);
    }

    // ─── APPLY — saves to IndexedDB ───
    async function applyImage() {
      if (!activeItem) return;

      let finalImg = null;

      if (activeTab === "upload") {
        if (!pendingDataUrl) { showStatus("Please select an image file first.", "error"); return; }
        finalImg = pendingDataUrl;
      } else {
        const url = document.getElementById("urlInput").value.trim();
        if (!url) { showStatus("Please enter an image URL.", "error"); return; }
        finalImg = url;
      }

      const key = fbKey(itemKey(activeItem));
      try {
        await dbSet(key, finalImg);
        overrides[key] = finalImg;
        notifyIndexPage();
        closeModal();
        renderGrid();
        showStatus(`✓ Image updated for "${activeItem.name}" — live on the main page now.`, "success");
      } catch (e) {
        showStatus("Storage error — could not save image.", "error");
      }
    }

    async function clearImage() {
      if (!activeItem) return;
      const key = fbKey(itemKey(activeItem));
      await dbDelete(key);
      delete overrides[key];
      notifyIndexPage();
      closeModal();
      renderGrid();
      showStatus(`Image reset to default for "${activeItem.name}".`, "");
    }

    // ─── RESET ALL ───
    async function resetAll() {
      const hasImg     = Object.keys(overrides).length;
      const hasDet     = Object.keys(detailOverrides).length;
      const hasAdded   = Object.keys(addedItems).length;
      const hasDeleted = Object.keys(deletedKeys).length;
      if (!hasImg && !hasDet && !hasAdded && !hasDeleted) { showStatus("Nothing to reset.", ""); return; }
      if (!confirm("Reset ALL images, detail changes, added items, and deleted items back to defaults? This cannot be undone.")) return;
      await dbClear();
      await storeClear("item_overrides");
      await storeClear("added_items");
      await storeClear("deleted_items");
      await storeClear("custom_categories");
      overrides        = {};
      detailOverrides  = {};
      addedItems       = {};
      deletedKeys      = {};
      customCategories = {};
      notifyIndexPage();
      renderGrid();
      showStatus("Everything reset to defaults.", "");
    }

    // ─── STATUS ───
    function showStatus(msg, type) {
      const bar = document.getElementById("statusBar");
      bar.textContent = msg;
      bar.className = "show " + (type || "");
      clearTimeout(bar._t);
      bar._t = setTimeout(() => bar.classList.remove("show"), 4000);
    }

    // ─── DRAG AND DROP ───
    const uploadZone = document.getElementById("uploadZone");
    uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("drag-over"); });
    uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag-over"));
    uploadZone.addEventListener("drop", e => {
      e.preventDefault();
      uploadZone.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith("image/")) {
        const dt = new DataTransfer();
        dt.items.add(file);
        document.getElementById("fileInput").files = dt.files;
        handleFileSelect({ target: { files: dt.files } });
      }
    });

    // seedDefaultImages removed — Firebase is source of truth

    // ─── CATEGORY MODAL ───
    function openCatModal() {
      renderCatList();
      document.getElementById("newCatInput").value = "";
      document.getElementById("catModalBg").classList.add("open");
    }
    function closeCatModal() {
      document.getElementById("catModalBg").classList.remove("open");
    }
    function handleCatModalBgClick(e) {
      if (e.target === document.getElementById("catModalBg")) closeCatModal();
    }

    function renderCatList() {
      const list = document.getElementById("catList");
      const allCats = getAllCategories().filter(c => c !== "All");
      list.innerHTML = allCats.map(c => {
        const isBase = BASE_CATEGORIES.includes(c);
        const itemCount = [...menuData, ...Object.values(addedItems)].filter(i => !deletedKeys[fbKey(itemKey(i))] && i.cat === c).length;
        return `
        <div class="cat-list-item">
          <span>
            <span class="cat-list-name">${c}</span>
            <span class="cat-list-badge">${itemCount} item${itemCount !== 1 ? "s" : ""}${isBase ? " · built-in" : ""}</span>
          </span>
          <button class="cat-list-del ${isBase ? "is-base" : ""}" onclick="deleteCategory('${c.replace(/'/g,"\\'")}')">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>`;
      }).join("") || '<div style="color:var(--muted);font-size:0.8rem;text-align:center;padding:20px;">No categories yet.</div>';
    }

    async function addCategory() {
      const input = document.getElementById("newCatInput");
      const name = input.value.trim();
      if (!name) return;
      const allCats = getAllCategories();
      if (allCats.includes(name)) { showStatus(`Category "${name}" already exists.`, "error"); return; }
      try {
        await storeSet("custom_categories", name, true);
        customCategories[name] = true;
        input.value = "";
        renderCatList();
        buildCatFilter();
        notifyIndexPage();
        showStatus(`✓ Category "${name}" added — available for new items now.`, "success");
      } catch(e) {
        showStatus("Could not save category.", "error");
      }
    }

    async function deleteCategory(name) {
      if (BASE_CATEGORIES.includes(name)) return;
      const itemsInCat = [...menuData, ...Object.values(addedItems)].filter(i => !deletedKeys[fbKey(itemKey(i))] && i.cat === name);
      if (itemsInCat.length > 0) {
        if (!confirm(`"${name}" has ${itemsInCat.length} item(s). Deleting the category will also delete all items in it. Continue?`)) return;
        // Delete all items in that category
        for (const item of itemsInCat) {
          const key = fbKey(itemKey(item));
          if (addedItems[key]) {
            await storeDelete("added_items", key);
            delete addedItems[key];
          } else {
            await storeSet("deleted_items", key, true);
            deletedKeys[key] = true;
          }
          await storeDelete("image_overrides", key);
          await storeDelete("item_overrides", key);
          delete overrides[key];
          delete detailOverrides[key];
        }
      } else {
        if (!confirm(`Delete category "${name}"?`)) return;
      }
      await storeDelete("custom_categories", name);
      delete customCategories[name];
      renderCatList();
      if (activeFilter === name) { activeFilter = "All"; }
      buildCatFilter();
      renderGrid();
      notifyIndexPage();
      showStatus(`Category "${name}" removed.`, "success");
    }

    async function init() {
      showStatus("Connecting to Firebase…", "");
      try {
        [overrides, detailOverrides, addedItems, deletedKeys, customCategories] = await Promise.all([
          fbGetAll("image_overrides"),
          fbGetAll("item_overrides"),
          fbGetAll("added_items"),
          fbGetAll("deleted_items"),
          fbGetAll("custom_categories")
        ]);
        // Apply detail overrides to live menuData
        Object.entries(detailOverrides).forEach(([key, det]) => {
          const idx = menuData.findIndex(i => fbKey(itemKey(i)) === key);
          if (idx !== -1) menuData[idx] = { ...menuData[idx], ...det };
        });
        buildCatFilter();
        renderGrid();
        showStatus("✓ Connected to Firebase — changes sync live to all devices.", "success");
      } catch(e) {
        showStatus("Firebase connection failed — check your internet connection.", "error");
        buildCatFilter();
        renderGrid();
      }
    }

    init();
  </script>
</body>

</html>
