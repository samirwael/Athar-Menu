<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATHAR — Menu Image Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cream: #f5f0e8;
      --beige: #ede5d5;
      --sand: #d9c9b0;
      --gold: #b8924a;
      --dark-gold: #8a6a2e;
      --brown: #5c3d1e;
      --dark-brown: #2e1a0e;
      --text: #3a2810;
      --muted: #7a6040;
      --white: #fdfaf5;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--dark-brown);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(184, 146, 74, 0.25);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px rgba(184, 146, 74, 0.6);
    }

    .header-title {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      color: var(--sand);
      text-transform: uppercase;
    }

    .header-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.82rem;
      color: rgba(217, 201, 176, 0.5);
      margin-left: 4px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* Live badge */
    .live-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: #6dbf6d;
      border: 1px solid rgba(109, 191, 109, 0.35);
      background: rgba(109, 191, 109, 0.08);
      padding: 8px 16px;
      border-radius: 50px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #6dbf6d;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(109, 191, 109, 0.5);
      }

      50% {
        opacity: 0.7;
        box-shadow: 0 0 0 5px rgba(109, 191, 109, 0);
      }
    }

    .btn-view-site {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      padding: 10px 20px;
      border: 1px solid rgba(184, 146, 74, 0.35);
      background: rgba(184, 146, 74, 0.1);
      color: var(--sand);
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s;
    }

    .btn-view-site:hover {
      background: rgba(184, 146, 74, 0.2);
      color: var(--gold);
    }

    .btn-reset {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      padding: 10px 20px;
      border: 1px solid rgba(217, 201, 176, 0.2);
      background: transparent;
      color: rgba(217, 201, 176, 0.55);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-reset:hover {
      border-color: rgba(217, 201, 176, 0.5);
      color: var(--sand);
    }

    /* ── TOOLBAR ── */
    .toolbar {
      padding: 20px 40px;
      background: var(--beige);
      border-bottom: 1px solid rgba(184, 146, 74, 0.15);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 340px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid rgba(184, 146, 74, 0.3);
      border-radius: 10px;
      background: var(--white);
      font-family: 'Lato', sans-serif;
      font-size: 0.8rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    #searchInput:focus {
      border-color: var(--gold);
    }

    #searchInput::placeholder {
      color: var(--muted);
    }

    .cat-filter {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .cat-chip {
      font-family: 'Lato', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      padding: 7px 16px;
      border: 1px solid var(--sand);
      border-radius: 50px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .cat-chip:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .cat-chip.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--white);
    }

    .count-badge {
      margin-left: auto;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.88rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── STATUS BAR ── */
    #statusBar {
      padding: 10px 40px;
      background: rgba(184, 146, 74, 0.08);
      border-bottom: 1px solid rgba(184, 146, 74, 0.12);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      display: none;
    }

    #statusBar.show {
      display: block;
    }

    #statusBar.success {
      background: rgba(100, 160, 100, 0.1);
      color: #4a7a40;
    }

    #statusBar.error {
      background: rgba(180, 80, 80, 0.1);
      color: #8a4040;
    }

    /* ── GRID ── */
    .grid-wrap {
      padding: 28px 40px 60px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .grid-section-title {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 18px 0 10px;
      border-bottom: 1px solid rgba(184, 146, 74, 0.15);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .grid-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(184, 146, 74, 0.15);
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 8px;
    }

    /* ── CARD ── */
    .item-card {
      background: var(--white);
      border: 1px solid rgba(184, 146, 74, 0.12);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      animation: cardIn 0.35s ease both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 32px rgba(92, 61, 30, 0.13);
      border-color: rgba(184, 146, 74, 0.35);
    }

    .item-card.has-custom {
      border-color: rgba(100, 160, 80, 0.4);
    }

    .item-card.has-custom::after {
      content: '✓';
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      background: rgba(80, 140, 60, 0.85);
      color: #fff;
      border-radius: 50%;
      font-size: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 4/3;
      position: relative;
      overflow: hidden;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .item-card:hover .card-thumb img {
      transform: scale(1.05);
    }

    .card-thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(46, 26, 14, 0.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .item-card:hover .card-overlay {
      opacity: 1;
    }

    .overlay-icon {
      width: 36px;
      height: 36px;
      border: 1.5px solid rgba(217, 201, 176, 0.7);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--sand);
    }

    .overlay-label {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: rgba(217, 201, 176, 0.8);
    }

    .card-body {
      padding: 13px 15px 15px;
    }

    .card-cat {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.58rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: var(--dark-brown);
      margin-bottom: 5px;
      line-height: 1.35;
    }

    .card-img-url {
      font-size: 0.6rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: monospace;
    }

    /* ── MODAL ── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(46, 26, 14, 0.72);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .modal-bg.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--white);
      border-radius: 20px;
      width: 100%;
      max-width: 520px;
      overflow: hidden;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.3s ease;
      box-shadow: 0 30px 80px rgba(46, 26, 14, 0.4);
    }

    .modal-bg.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-preview {
      width: 100%;
      aspect-ratio: 16/9;
      position: relative;
      overflow: hidden;
      background: var(--dark-brown);
    }

    .modal-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .modal-preview-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(217, 201, 176, 0.3);
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
    }

    .modal-body {
      padding: 24px 28px 28px;
    }

    .modal-eyebrow {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .modal-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      color: var(--dark-brown);
      margin-bottom: 18px;
    }

    .modal-tabs {
      display: flex;
      gap: 0;
      border: 1px solid rgba(184, 146, 74, 0.25);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .modal-tab {
      flex: 1;
      padding: 9px;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-tab.active {
      background: var(--gold);
      color: var(--white);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .upload-zone {
      border: 1.5px dashed rgba(184, 146, 74, 0.4);
      border-radius: 12px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
      background: rgba(184, 146, 74, 0.03);
      position: relative;
    }

    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: var(--gold);
      background: rgba(184, 146, 74, 0.07);
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      width: 40px;
      height: 40px;
      border: 1px solid rgba(184, 146, 74, 0.35);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      color: var(--gold);
    }

    .upload-zone p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .upload-zone span {
      font-size: 0.65rem;
      color: var(--sand);
    }

    .url-input-wrap {
      position: relative;
    }

    .url-input-wrap input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid rgba(184, 146, 74, 0.3);
      border-radius: 10px;
      background: var(--beige);
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input-wrap input:focus {
      border-color: var(--gold);
    }

    .url-input-wrap input::placeholder {
      color: var(--sand);
      font-family: 'Lato', sans-serif;
    }

    .url-preview-note {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 8px;
      font-style: italic;
    }

    .filename-wrap {
      margin-top: 14px;
    }

    .filename-label {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    .filename-wrap input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(184, 146, 74, 0.3);
      border-radius: 10px;
      background: var(--beige);
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .filename-wrap input:focus {
      border-color: var(--gold);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .btn-apply {
      flex: 1;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      padding: 12px;
      border: 1px solid var(--gold);
      background: var(--gold);
      color: var(--white);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-apply:hover {
      background: var(--dark-gold);
      border-color: var(--dark-gold);
    }

    .btn-apply:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-clear {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      padding: 12px 18px;
      border: 1px solid rgba(184, 146, 74, 0.25);
      background: transparent;
      color: var(--muted);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-clear:hover {
      border-color: #c06060;
      color: #c06060;
    }

    .btn-cancel {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      padding: 12px 16px;
      border: 1px solid rgba(184, 146, 74, 0.2);
      background: transparent;
      color: var(--muted);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .btn-cancel:hover {
      border-color: var(--sand);
      color: var(--text);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      header {
        padding: 14px 20px;
        flex-wrap: wrap;
        gap: 10px;
      }

      .toolbar {
        padding: 14px 20px;
      }

      .grid-wrap {
        padding: 16px 20px 40px;
      }

      .menu-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 10px;
      }

      .cat-filter {
        display: none;
      }

      .count-badge {
        display: none;
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(184, 146, 74, 0.3);
      border-radius: 3px;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="header-brand">
      <div class="header-brand-dot"></div>
      <span class="header-title">Athar</span>
      <span class="header-sub">Menu Image Manager</span>
    </div>
    <div class="header-actions">
      <div class="live-badge">
        <div class="live-dot"></div>Live Sync
      </div>
      <a href="index.html" target="_blank" class="btn-view-site">View Site ↗</a>
      <button class="btn-reset" onclick="resetAll()">Reset All</button>
    </div>
  </header>

  <!-- STATUS -->
  <div id="statusBar"></div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input type="text" id="searchInput" placeholder="Search menu items…" oninput="renderGrid()">
    </div>
    <div class="cat-filter" id="catFilter"></div>
    <span class="count-badge" id="countBadge"></span>
  </div>

  <!-- MAIN GRID -->
  <div class="grid-wrap" id="gridWrap"></div>

  <!-- ITEM MODAL -->
  <div class="modal-bg" id="modalBg" onclick="handleModalBgClick(event)">
    <div class="modal" id="modal">
      <div class="modal-preview" id="modalPreview">
        <div class="modal-preview-placeholder" id="modalPreviewPlaceholder">No Image</div>
        <img id="modalPreviewImg" src="" alt="" style="display:none;">
      </div>
      <div class="modal-body">
        <p class="modal-eyebrow" id="modalCat"></p>
        <h2 class="modal-title" id="modalName"></h2>
        <div class="modal-tabs">
          <button class="modal-tab active" onclick="switchTab('upload')">Upload File</button>
          <button class="modal-tab" onclick="switchTab('url')">Image URL</button>
        </div>

        <!-- Upload tab -->
        <div class="tab-panel active" id="tab-upload">
          <div class="upload-zone" id="uploadZone">
            <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
            <div class="upload-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
              </svg>
            </div>
            <p>Drop image here or click to browse</p>
            <span>JPG, PNG, WEBP — any size</span>
          </div>
          <div class="filename-wrap">
            <label class="filename-label" for="filenameInput">Save as filename</label>
            <input type="text" id="filenameInput" placeholder="espresso.jpg" />
          </div>
        </div>

        <!-- URL tab -->
        <div class="tab-panel" id="tab-url">
          <div class="url-input-wrap">
            <input type="text" id="urlInput" placeholder="https://images.unsplash.com/…" oninput="previewUrl()">
          </div>
          <p class="url-preview-note">Paste any image URL — Unsplash, your CDN, or a direct link.</p>
        </div>

        <div class="modal-actions">
          <button class="btn-apply" id="btnApply" onclick="applyImage()">Apply Image</button>
          <button class="btn-clear" onclick="clearImage()">Remove</button>
          <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ─── FULL MENU DATA ───
    const menuData = [
      {
        cat: "Hot Drinks", name: "Espresso", desc: "Bold single-origin shot, rich and full-bodied.", price: "50 EGP",
        img: "https://images.unsplash.com/photo-1510707577719-ae7c14805e3a?w=600&q=80"

    // ─── FIREBASE SETUP ───
    // 👇 REPLACE these values with your own Firebase project config
    const FIREBASE_DB_URL = "https://athar-menu-default-rtdb.firebaseio.com";
    const FIREBASE_PATH = "image_overrides";

    function firebaseUrl(key) {
      const encoded = key ? encodeURIComponent(key).replace(/%3A/g, ":").replace(/%20/g, " ") : "";
      // Firebase keys can't contain . # $ [ ]  — encode them
      const safeKey = key ? key.replace(/\./g, "%2E").replace(/#/g, "%23").replace(/\$/g, "%24").replace(/\[/g, "%5B").replace(/\]/g, "%5D") : "";
      return `${FIREBASE_DB_URL}/${FIREBASE_PATH}${safeKey ? "/" + safeKey : ""}.json`;
    }

    async function dbGet(key) {
      const res = await fetch(firebaseUrl(key));
      if (!res.ok) throw new Error("Firebase read failed");
      const val = await res.json();
      return val ?? null;
    }

    async function dbSet(key, value) {
      const res = await fetch(firebaseUrl(key), {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(value)
      });
      if (!res.ok) throw new Error("Firebase write failed");
    }

    async function dbDelete(key) {
      const res = await fetch(firebaseUrl(key), { method: "DELETE" });
      if (!res.ok) throw new Error("Firebase delete failed");
    }

    async function dbGetAll() {
      const res = await fetch(firebaseUrl(""));
      if (!res.ok) throw new Error("Firebase read failed");
      const data = await res.json();
      return data ?? {};
    }

    async function dbClear() {
      const res = await fetch(firebaseUrl(""), {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(null)
      });
      if (!res.ok) throw new Error("Firebase clear failed");
    }

    // Notify other tabs/windows of changes
    function notifyIndexPage() {
      localStorage.setItem("athar_idb_updated", Date.now().toString());
    }

    // ─── STATE ───
    const catColors = {
      "Hot Drinks": { bg: "#4a2810", accent: "#c9a97a" },
      "Iced Coffee": { bg: "#1a3040", accent: "#7ab8d4" },
      "Coffee Blended": { bg: "#3a2010", accent: "#c4a060" },
      "Non-Coffee Blended": { bg: "#1a2818", accent: "#8ac48a" },
      "Milkshakes": { bg: "#3a1030", accent: "#d490b0" },
      "Fresh Juice": { bg: "#2a3010", accent: "#b0c860" },
      "Refreshers": { bg: "#102830", accent: "#60c0c0" },
      "Matcha": { bg: "#142814", accent: "#70b870" },
      "Tea": { bg: "#301818", accent: "#c48050" },
      "Breakfast": { bg: "#3a2808", accent: "#e8b860" },
      "Desserts": { bg: "#2a1018", accent: "#c06880" },
      "Extras": { bg: "#282010", accent: "#b8924a" },
    };

    let overrides = {};
    let activeFilter = "All";
    let activeItem = null;
    let pendingDataUrl = null;
    let pendingFilename = null;
    let activeTab = "upload";

    const categories = ["All", ...Object.keys(catColors)];

    // ─── INIT ───
    async function init() {
      overrides = await dbGetAll();
      buildCatFilter();
      renderGrid();
    }

    function buildCatFilter() {
      const wrap = document.getElementById("catFilter");
      wrap.innerHTML = categories.map(c =>
        `<button class="cat-chip ${c === "All" ? "active" : ""}" onclick="setFilter('${c}')">${c}</button>`
      ).join("");
    }

    function setFilter(cat) {
      activeFilter = cat;
      document.querySelectorAll(".cat-chip").forEach(b => b.classList.toggle("active", b.textContent === cat));
      renderGrid();
    }

    // ─── RENDER GRID ───
    function renderGrid() {
      const wrap = document.getElementById("gridWrap");
      const q = document.getElementById("searchInput").value.trim().toLowerCase();

      let items = activeFilter === "All" ? menuData : menuData.filter(i => i.cat === activeFilter);
      if (q) items = items.filter(i => `${i.name} ${i.cat} ${i.desc}`.toLowerCase().includes(q));

      document.getElementById("countBadge").textContent = `${items.length} item${items.length !== 1 ? "s" : ""}`;

      if (!items.length) {
        wrap.innerHTML = '<div class="menu-grid"><div class="empty-state">No items found.</div></div>';
        return;
      }

      const grouped = {};
      items.forEach(item => {
        if (!grouped[item.cat]) grouped[item.cat] = [];
        grouped[item.cat].push(item);
      });

      wrap.innerHTML = Object.entries(grouped).map(([cat, catItems]) => `
    <div class="grid-section-title">${cat} <span style="color:var(--sand);font-size:0.6rem;">${catItems.length}</span></div>
    <div class="menu-grid">
      ${catItems.map(item => renderCard(item)).join("")}
    </div>
  `).join("");
    }

    function itemKey(item) {
      return item.cat + "::" + item.name;
    }

    function renderCard(item) {
      const key = itemKey(item);
      const customImg = overrides[key];
      const imgSrc = customImg || item.img;
      const hasCustom = !!customImg;
      const col = catColors[item.cat] || { bg: "#2e1a0e", accent: "#b8924a" };
      const shortUrl = imgSrc && imgSrc.startsWith("data:") ? "📎 Local file (embedded)" : (imgSrc || "").replace("https://images.unsplash.com/", "unsplash/").replace(/\?.*/, "");

      return `
    <div class="item-card ${hasCustom ? "has-custom" : ""}" onclick="openModal('${item.cat.replace(/'/g, "\\'")}', '${item.name.replace(/'/g, "\\'")}')">
      <div class="card-thumb" style="background:linear-gradient(145deg,${col.bg}ee,${col.bg}99);">
        <img src="${imgSrc}" alt="${item.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="card-thumb-placeholder" style="display:none;">
          <svg width="32" viewBox="0 0 40 56" fill="${col.accent}" opacity="0.5"><path d="M20 2 C13 11 7 18 7 28 C7 40 13 50 20 54 C27 50 33 40 33 28 C33 18 27 11 20 2Z"/></svg>
        </div>
        <div class="card-overlay">
          <div class="overlay-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </div>
          <span class="overlay-label">Change Image</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-cat">${item.cat}</div>
        <div class="card-name">${item.name}</div>
        <div class="card-img-url">${shortUrl}</div>
      </div>
    </div>`;
    }

    // ─── MODAL ───
    function openModal(cat, name) {
      activeItem = menuData.find(i => i.cat === cat && i.name === name);
      if (!activeItem) return;

      const key = itemKey(activeItem);
      const customImg = overrides[key];
      const imgSrc = customImg || activeItem.img;

      document.getElementById("modalCat").textContent = activeItem.cat;
      document.getElementById("modalName").textContent = activeItem.name;
      updateModalPreview(imgSrc);

      document.getElementById("fileInput").value = "";
      document.getElementById("filenameInput").value = suggestFilename(name);
      document.getElementById("urlInput").value = imgSrc && !imgSrc.startsWith("data:") ? imgSrc : "";
      pendingDataUrl = null;
      pendingFilename = null;

      switchTab("upload");
      document.getElementById("modalBg").classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      document.getElementById("modalBg").classList.remove("open");
      document.body.style.overflow = "";
      activeItem = null;
      pendingDataUrl = null;
    }

    function handleModalBgClick(e) {
      if (e.target === document.getElementById("modalBg")) closeModal();
    }

    function updateModalPreview(src) {
      const img = document.getElementById("modalPreviewImg");
      const placeholder = document.getElementById("modalPreviewPlaceholder");
      if (src) {
        img.src = src;
        img.style.display = "block";
        placeholder.style.display = "none";
      } else {
        img.style.display = "none";
        placeholder.style.display = "flex";
      }
    }

    function switchTab(tab) {
      activeTab = tab;
      document.querySelectorAll(".modal-tab").forEach((b, i) => b.classList.toggle("active", (i === 0 && tab === "upload") || (i === 1 && tab === "url")));
      document.getElementById("tab-upload").classList.toggle("active", tab === "upload");
      document.getElementById("tab-url").classList.toggle("active", tab === "url");
    }

    // ─── FILE UPLOAD ───
    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        pendingDataUrl = ev.target.result;
        updateModalPreview(pendingDataUrl);
      };
      reader.readAsDataURL(file);
      const ext = file.name.split(".").pop();
      if (!document.getElementById("filenameInput").value) {
        document.getElementById("filenameInput").value = suggestFilename(activeItem.name, ext);
      }
    }

    function suggestFilename(name, ext = "jpg") {
      return name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") + "." + ext;
    }

    // ─── URL PREVIEW ───
    function previewUrl() {
      const url = document.getElementById("urlInput").value.trim();
      if (url) updateModalPreview(url);
    }

    // ─── APPLY — saves to IndexedDB ───
    async function applyImage() {
      if (!activeItem) return;

      let finalImg = null;

      if (activeTab === "upload") {
        if (!pendingDataUrl) { showStatus("Please select an image file first.", "error"); return; }
        finalImg = pendingDataUrl;
      } else {
        const url = document.getElementById("urlInput").value.trim();
        if (!url) { showStatus("Please enter an image URL.", "error"); return; }
        finalImg = url;
      }

      const key = itemKey(activeItem);
      try {
        await dbSet(key, finalImg);
        overrides[key] = finalImg;
        notifyIndexPage();
        closeModal();
        renderGrid();
        showStatus(`✓ Image updated for "${activeItem.name}" — live on the main page now.`, "success");
      } catch (e) {
        showStatus("Storage error — could not save image.", "error");
      }
    }

    async function clearImage() {
      if (!activeItem) return;
      const key = itemKey(activeItem);
      await dbDelete(key);
      delete overrides[key];
      notifyIndexPage();
      closeModal();
      renderGrid();
      showStatus(`Image reset to default for "${activeItem.name}".`, "");
    }

    // ─── RESET ALL ───
    async function resetAll() {
      if (!Object.keys(overrides).length) { showStatus("No custom images to reset.", ""); return; }
      if (!confirm("Reset ALL custom images back to defaults? This cannot be undone.")) return;
      await dbClear();
      overrides = {};
      notifyIndexPage();
      renderGrid();
      showStatus("All images reset to defaults.", "");
    }

    // ─── STATUS ───
    function showStatus(msg, type) {
      const bar = document.getElementById("statusBar");
      bar.textContent = msg;
      bar.className = "show " + (type || "");
      clearTimeout(bar._t);
      bar._t = setTimeout(() => bar.classList.remove("show"), 4000);
    }

    // ─── DRAG AND DROP ───
    const uploadZone = document.getElementById("uploadZone");
    uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("drag-over"); });
    uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag-over"));
    uploadZone.addEventListener("drop", e => {
      e.preventDefault();
      uploadZone.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith("image/")) {
        const dt = new DataTransfer();
        dt.items.add(file);
        document.getElementById("fileInput").files = dt.files;
        handleFileSelect({ target: { files: dt.files } });
      }
    });

    init();
  </script>
</body>

</html>
